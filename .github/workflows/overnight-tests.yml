name: Overnight Tests

on:
  workflow_dispatch:  # This lets us run it manually right now

jobs:
  basic-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Run Backend Tests
        run: |
          cd backend
          npm ci
          npm test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test-db
          JWT_SECRET: test-secret
          
      - name: Run Frontend Tests
        run: |
          cd frontend
          npm ci
          npm test
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/coverage
            frontend/coverage
          
      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "?? Overnight Test Results"
          body: |
            Your tests have finished running! Check the results here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_USER }}
          from: Cricket Coach App CI
